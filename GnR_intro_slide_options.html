<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GnR Final Intro Slide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,500..900,35..100,0..1&family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #fbf7ef;
      --cream-deep: #f3ead8;
      --ink: #1a1612;
      --gold: #b8954a;
      --gold-deep: #8a6420;
      --blue: #5B8FD4;
      --red: #c8462c;
      --serif: "Fraunces", "Playfair Display", Georgia, serif;
      --ui: "Manrope", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #17120e;
      color: var(--ink);
      font-family: var(--ui);
    }

    body {
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .slide {
      position: relative;
      width: min(1600px, calc(100vw - 44px));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 30%, #fffaf1 0%, var(--cream) 54%, var(--cream-deep) 100%);
      box-shadow: 0 28px 90px rgba(0,0,0,.34);
      isolation: isolate;
    }

    .scale-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 1;
      filter: saturate(.98) contrast(1.02);
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(251,247,239,.98) 0%, rgba(251,247,239,.94) 22%, rgba(251,247,239,.42) 37%, rgba(251,247,239,.06) 56%, rgba(251,247,239,.00) 70%, rgba(251,247,239,.90) 91%, rgba(251,247,239,.98) 100%),
        radial-gradient(ellipse at 50% 12%, rgba(251,247,239,.82) 0%, rgba(251,247,239,.26) 46%, transparent 72%);
    }

    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 16%, rgba(184,149,74,.08), transparent 28%),
        radial-gradient(circle at 84% 74%, rgba(91,143,212,.05), transparent 30%),
        linear-gradient(90deg, rgba(26,22,18,.035), transparent 12%, transparent 88%, rgba(26,22,18,.035));
      mix-blend-mode: multiply;
    }

    .eyebrow {
      position: absolute;
      top: 28px;
      left: 48px;
      z-index: 30;
      font-family: var(--ui);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .mark {
      position: absolute;
      top: 24px;
      right: 42px;
      z-index: 30;
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 850;
      letter-spacing: 0;
      opacity: .9;
    }

    .mark .g { color: var(--blue); }
    .mark .n { color: var(--gold); font-style: italic; padding: 0 1px; }
    .mark .r { color: var(--red); }

    .headline {
      position: absolute;
      z-index: 10;
      top: 54px;
      left: 92px;
      right: 92px;
      margin: 0 auto;
      max-width: 1320px;
      font-family: var(--serif);
      font-size: 76px;
      line-height: .99;
      font-weight: 850;
      letter-spacing: 0;
      text-align: center;
      color: var(--ink);
      text-wrap: balance;
    }

    .headline em {
      color: var(--gold-deep);
      font-style: italic;
      font-weight: 850;
      text-shadow: 0 1px 2px rgba(251,247,239,.6);
    }

    .footer {
      position: absolute;
      z-index: 12;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      width: 980px;
      max-width: calc(100% - 240px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
      font-family: var(--serif);
      font-size: 48px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
      color: var(--ink);
      text-align: center;
      white-space: nowrap;
    }

    .footer::before,
    .footer::after {
      content: "";
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,149,74,.70));
      transform: translateY(4px);
    }

    .footer::after {
      background: linear-gradient(90deg, rgba(184,149,74,.70), transparent);
    }

    .proof {
      position: absolute;
      z-index: 11;
      left: 50%;
      bottom: 102px;
      transform: translateX(-50%);
      width: 760px;
      max-width: calc(100% - 320px);
      margin: 0;
      font-family: var(--ui);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(26,22,18,.54);
      text-align: center;
    }

    @media (max-width: 1100px) {
      body { padding: 12px; }
      .slide { width: calc(100vw - 24px); }
      .headline { top: 44px; left: 48px; right: 48px; font-size: 50px; }
      .footer { bottom: 26px; font-size: 32px; max-width: calc(100% - 120px); }
      .proof { bottom: 82px; font-size: 10px; max-width: calc(100% - 120px); }
      .eyebrow { top: 18px; left: 24px; font-size: 8px; }
      .mark { top: 14px; right: 22px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <section class="slide" aria-label="GnR final intro slide">
    <img class="scale-art" src="assets/intro-final-scale.png" alt="">
    <div class="eyebrow">The missing signal</div>
    <div class="mark" aria-label="GnR"><span class="g">G</span><span class="n">n</span><span class="r">R</span></div>
    <h1 class="headline">The most important feeling in a fulfilling life is still <em>invisible</em> to technology.</h1>
    <p class="proof">Feeling connected predicts health, happiness, and longevity.</p>
    <div class="footer"><span>GnR measures the missing signal.</span></div>
  </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GnR Attention Connection Final Slide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,850;9..144,900&family=Manrope:wght@600;700;800;900&display=swap');

  :root {
    --paper: #fbf7ef;
    --ink: #1a1612;
    --blue: #5B8FD4;
    --gold: #b8954a;
    --red: #c8462c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #211a14;
    font-family: "Manrope", system-ui, sans-serif;
    color: var(--ink);
  }

  body.export { background: var(--paper); }

  .slide {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(circle at 19% 81%, rgba(184, 149, 74, .16), transparent 30%),
      linear-gradient(90deg, var(--paper) 0 49%, var(--ink) 49% 100%);
    box-shadow: 0 26px 80px rgba(0, 0, 0, .34);
    isolation: isolate;
  }

  body.export .slide { box-shadow: none; }

  .eyebrow {
    position: absolute;
    top: 28px;
    left: 48px;
    z-index: 10;
    font-family: "Manrope", system-ui, sans-serif;
    text-transform: uppercase;
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .22em;
    color: var(--red);
  }

  .headline {
    position: absolute;
    left: 96px;
    top: 164px;
    width: 770px;
    z-index: 3;
  }

  h1 {
    margin: 0;
    font-family: "Fraunces", "Playfair Display", Georgia, serif;
    font-size: 88px;
    line-height: 1.01;
    font-weight: 850;
    letter-spacing: 0;
  }

  .gold { color: var(--gold); }

  .proof {
    position: absolute;
    left: 96px;
    bottom: 108px;
    width: 730px;
    display: grid;
    grid-template-columns: 74px 1fr;
    gap: 22px;
    align-items: center;
    z-index: 3;
  }

  .proof-mark {
    width: 74px;
    height: 74px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--gold);
    font-family: "Fraunces", Georgia, serif;
    font-size: 48px;
    font-weight: 850;
  }

  .proof-copy {
    font-size: 30px;
    line-height: 1.18;
    font-weight: 850;
    color: var(--ink);
  }

  .dark-field {
    position: absolute;
    inset: 0 0 0 49%;
    background:
      radial-gradient(circle at 72% 48%, rgba(184, 149, 74, .28), transparent 32%),
      radial-gradient(circle at 34% 46%, rgba(91, 143, 212, .16), transparent 26%),
      linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.10));
    z-index: 1;
  }

  .dark-field::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(251,247,239,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(251,247,239,.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(circle at 68% 52%, black 0%, transparent 75%);
  }

  .visual {
    position: absolute;
    right: 70px;
    top: 118px;
    width: 875px;
    height: 850px;
    z-index: 2;
  }

  .visual svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  .word {
    position: absolute;
    bottom: 72px;
    font-size: 15px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: .24em;
    text-transform: uppercase;
  }

  .word.capture {
    left: 1044px;
    color: rgba(251, 247, 239, .42);
  }

  .word.create {
    right: 134px;
    color: var(--gold);
  }

  @media (max-width: 1950px) {
    body { align-items: start; padding-top: 40px; }
    .slide { transform: scale(.62); transform-origin: top center; }
    body.export { padding-top: 0; }
    body.export .slide { transform: none; }
  }
</style>
</head>
<body>
  <section class="slide">
    <div class="eyebrow">Attention vs Connection</div>

    <div class="headline">
      <h1>Digital community<br>captures attention.<br><span class="gold">Real-world community<br>creates connection.</span></h1>
    </div>

    <div class="proof">
      <div class="proof-mark">&amp;</div>
      <div class="proof-copy">People are both product and customer.</div>
    </div>

    <div class="dark-field" aria-hidden="true"></div>

    <div class="visual" aria-hidden="true">
      <svg viewBox="0 0 875 850" role="img">
        <defs>
          <linearGradient id="funnel" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#5B8FD4" stop-opacity=".9"/>
            <stop offset=".72" stop-color="#5B8FD4" stop-opacity=".22"/>
            <stop offset="1" stop-color="#5B8FD4" stop-opacity=".02"/>
          </linearGradient>
          <radialGradient id="halo" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#f7d786" stop-opacity=".6"/>
            <stop offset=".34" stop-color="#b8954a" stop-opacity=".2"/>
            <stop offset="1" stop-color="#b8954a" stop-opacity="0"/>
          </radialGradient>
          <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
            <feGaussianBlur stdDeviation="13" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <g transform="translate(16 80)">
          <path d="M26 18 L324 18 L214 650 L136 650 Z" fill="url(#funnel)" stroke="#5B8FD4" stroke-opacity=".4"/>
          <g stroke="#8bb8f0" stroke-opacity=".18" fill="none">
            <path d="M70 98 C116 210 146 410 175 585"/>
            <path d="M268 84 C224 228 198 404 175 585"/>
            <path d="M164 132 C178 284 176 420 175 585"/>
          </g>
          <g fill="#fbf7ef" opacity=".9">
            <circle cx="70" cy="98" r="7"/>
            <circle cx="164" cy="132" r="7"/>
            <circle cx="268" cy="84" r="5"/>
            <circle cx="112" cy="255" r="6"/>
            <circle cx="220" cy="290" r="6"/>
            <circle cx="160" cy="448" r="6"/>
            <circle cx="175" cy="585" r="5"/>
          </g>
        </g>

        <g transform="translate(398 36)">
          <circle cx="258" cy="392" r="344" fill="url(#halo)"/>
          <g stroke="#b8954a" stroke-width="2.4" stroke-opacity=".72" fill="none">
            <path d="M91 184 C182 112 338 112 452 210"/>
            <path d="M91 184 C130 324 220 384 258 392"/>
            <path d="M452 210 C376 276 324 344 258 392"/>
            <path d="M68 524 C164 462 232 442 258 392"/>
            <path d="M258 392 C340 436 424 484 496 570"/>
            <path d="M154 640 C252 590 360 600 496 570"/>
            <path d="M164 352 C254 260 372 312 514 392"/>
            <path d="M258 392 C250 510 240 586 154 640"/>
          </g>

          <g filter="url(#glow)">
            <circle cx="91" cy="184" r="47" fill="#1a1612" stroke="#b8954a" stroke-width="2.4"/>
            <circle cx="452" cy="210" r="47" fill="#1a1612" stroke="#b8954a" stroke-width="2.4"/>
            <circle cx="164" cy="352" r="47" fill="#1a1612" stroke="#b8954a" stroke-width="2.4"/>
            <circle cx="380" cy="518" r="47" fill="#1a1612" stroke="#b8954a" stroke-width="2.4"/>
            <circle cx="68" cy="524" r="47" fill="#1a1612" stroke="#b8954a" stroke-width="2.4"/>
            <circle cx="496" cy="570" r="47" fill="#1a1612" stroke="#b8954a" stroke-width="2.4"/>
            <circle cx="154" cy="640" r="47" fill="#1a1612" stroke="#b8954a" stroke-width="2.4"/>
            <circle cx="258" cy="392" r="84" fill="#1a1612" stroke="#b8954a" stroke-width="3"/>
          </g>

          <g fill="#fbf7ef">
            <g transform="translate(91 184)"><circle cy="-13" r="14"/><path d="M-20 24 C-15 4 15 4 20 24" opacity=".88"/></g>
            <g transform="translate(452 210)"><circle cy="-13" r="14"/><path d="M-20 24 C-15 4 15 4 20 24" opacity=".88"/></g>
            <g transform="translate(164 352)"><circle cy="-13" r="14"/><path d="M-20 24 C-15 4 15 4 20 24" opacity=".88"/></g>
            <g transform="translate(380 518)"><circle cy="-13" r="14"/><path d="M-20 24 C-15 4 15 4 20 24" opacity=".88"/></g>
            <g transform="translate(68 524)"><circle cy="-13" r="14"/><path d="M-20 24 C-15 4 15 4 20 24" opacity=".88"/></g>
            <g transform="translate(496 570)"><circle cy="-13" r="14"/><path d="M-20 24 C-15 4 15 4 20 24" opacity=".88"/></g>
            <g transform="translate(154 640)"><circle cy="-13" r="14"/><path d="M-20 24 C-15 4 15 4 20 24" opacity=".88"/></g>
          </g>

          <text x="258" y="382" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="48" font-weight="850" fill="#fbf7ef">people</text>
          <text x="258" y="424" text-anchor="middle" font-family="Manrope, sans-serif" font-size="17" font-weight="900" letter-spacing="3" fill="#b8954a">CREATE VALUE</text>
        </g>
      </svg>
    </div>

    <div class="word capture">Capture</div>
    <div class="word create">Create</div>
  </section>
  <script>
    if (new URLSearchParams(window.location.search).get("export") === "1") {
      document.body.classList.add("export");
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GnR Attention Connection Final Slide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,850;9..144,900&family=Manrope:wght@600;700;800;900&display=swap');

  :root {
    --paper: #fbf7ef;
    --ink: #1a1612;
    --blue: #5B8FD4;
    --gold: #b8954a;
    --red: #c8462c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #211a14;
    font-family: "Manrope", system-ui, sans-serif;
    color: var(--ink);
  }

  body.export { background: var(--paper); }

  .slide {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(circle at 19% 81%, rgba(184, 149, 74, .16), transparent 30%),
      linear-gradient(90deg, var(--paper) 0 49%, var(--ink) 49% 100%);
    box-shadow: 0 26px 80px rgba(0, 0, 0, .34);
    isolation: isolate;
  }

  body.export .slide { box-shadow: none; }

  .eyebrow {
    position: absolute;
    top: 28px;
    left: 48px;
    z-index: 10;
    font-family: "Manrope", system-ui, sans-serif;
    text-transform: uppercase;
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .22em;
    color: var(--red);
  }

  .headline {
    position: absolute;
    left: 96px;
    top: 164px;
    width: 770px;
    z-index: 3;
  }

  h1 {
    margin: 0;
    font-family: "Fraunces", "Playfair Display", Georgia, serif;
    font-size: 88px;
    line-height: 1.01;
    font-weight: 850;
    letter-spacing: 0;
  }

  .gold { color: var(--gold); }

  .proof {
    position: absolute;
    left: 96px;
    bottom: 108px;
    width: 730px;
    display: grid;
    grid-template-columns: 74px 1fr;
    gap: 22px;
    align-items: center;
    z-index: 3;
  }

  .proof-mark {
    width: 74px;
    height: 74px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--gold);
    font-family: "Fraunces", Georgia, serif;
    font-size: 48px;
    font-weight: 850;
  }

  .proof-copy {
    font-size: 30px;
    line-height: 1.18;
    font-weight: 850;
    color: var(--ink);
  }

  .dark-field {
    position: absolute;
    inset: 0 0 0 49%;
    background:
      radial-gradient(circle at 72% 48%, rgba(184, 149, 74, .18), transparent 32%),
      radial-gradient(circle at 34% 46%, rgba(91, 143, 212, .10), transparent 26%),
      linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.10));
    z-index: 1;
  }

  .dark-field::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(251,247,239,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(251,247,239,.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(circle at 68% 52%, black 0%, transparent 75%);
  }

  .visual {
    position: absolute;
    right: 0;
    top: 160px;
    width: 980px;
    height: 680px;
    z-index: 2;
  }

  .visual img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center center;
    filter: saturate(1.05) contrast(1.05);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 7%, #000 88%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, #000 7%, #000 88%, transparent 100%);
  }

  .word {
    position: absolute;
    bottom: 72px;
    font-size: 15px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: .24em;
    text-transform: uppercase;
  }

  .word.capture {
    left: 1038px;
    color: rgba(251, 247, 239, .42);
  }

  .word.create {
    right: 134px;
    color: var(--gold);
  }

  @media (max-width: 1950px) {
    body { align-items: start; padding-top: 40px; }
    .slide { transform: scale(.62); transform-origin: top center; }
    body.export { padding-top: 0; }
    body.export .slide { transform: none; }
  }
</style>
</head>
<body>
  <section class="slide">
    <div class="eyebrow">Attention vs Connection</div>

    <div class="headline">
      <h1>Digital community<br>captures attention.<br><span class="gold">Real-world community<br>creates connection.</span></h1>
    </div>

    <div class="proof">
      <div class="proof-mark">&amp;</div>
      <div class="proof-copy">The product only exists when people show up together.</div>
    </div>

    <div class="dark-field" aria-hidden="true"></div>

    <div class="visual" aria-hidden="true">
      <img src="assets/explorations/community-value-final/attention-connection-synthetic-visual.png" alt="">
    </div>

    <div class="word capture">Capture</div>
    <div class="word create">Create</div>
  </section>
  <script>
    if (new URLSearchParams(window.location.search).get("export") === "1") {
      document.body.classList.add("export");
    }
  </script>
</body>
</html>
